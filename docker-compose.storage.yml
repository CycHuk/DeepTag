version: '3.9'

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"   
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY} ${AWS_SECRET_KEY};
      mc mb local/${AWS_STORAGE_BUCKET_NAME} --ignore-existing;
      mc anonymous set download local/${AWS_STORAGE_BUCKET_NAME};
      exit 0;
      "

volumes:
  minio_data: