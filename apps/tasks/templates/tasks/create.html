{% extends 'base.html' %}

{% block content %}
{% include 'components/header.html' %}
<main class="container mx-auto p-6 flex flex-col items-center">
<!-- BREADCRUMBS -->
<nav class="w-full max-w-2xl mb-6" aria-label="Breadcrumb">
    <ul class="flex text-sm text-base-content/70 gap-x-2 items-center">
        <li>
            <a href="{% url 'projects:index' %}" class="hover:underline">Проекты</a>
        </li>
        <li class="flex items-center">
            <span class="icon-[tabler--chevron-right] w-4 h-4"></span>
        </li>
        <li>
            <a href="{% url 'projects:detail' project.id %}" class="hover:underline">{{ project.name }}</a>
        </li>
        <li class="flex items-center">
            <span class="icon-[tabler--chevron-right] w-4 h-4"></span>
        </li>
        <li aria-current="page" class="text-base-content font-medium">
            Создать задачу
        </li>
    </ul>
</nav>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Создать</button>
</form>
</main>
{% endblock %}
