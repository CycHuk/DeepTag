<div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-xl">Экспорт проекта</h2>

        <form method="post" action="{% url 'projects:create_export' project.id %}">
            {% csrf_token %}

            <button type="submit" class="btn btn-primary btn-sm">
                Создать экспорт
            </button>
        </form>
    </div>

    <!-- Таблица экспортов -->
    <div class="flex-1 overflow-x-auto">
        <table class="table w-full">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Дата создания</th>
                    <th>Статус</th>
                    <th>Файл</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="5" class="text-center text-base-content/50 py-6">
                        Экспортов пока нет
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
