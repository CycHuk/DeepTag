{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="h-screen flex flex-col">
    <header id="header" class="flex justify-center shrink-0 border-b border-base-content/20 w-full">
        {% include 'annotations/header.html' %}
    </header>

    <main class="flex flex-1 overflow-hidden">
        <div id="leftbar" class="overflow-auto max-h-full">
            {% include 'annotations/leftbar.html' %}
        </div>

        <div id="annotation" class="flex-1 overflow-auto max-h-full">
            {% include 'annotations/annotation.html' %}
        </div>
    </main>
</div>
<script src="https://unpkg.com/konva@10/konva.min.js"></script>
<script type="module" src="{% static 'annotations/main.js' %}"></script>
{% endblock %}
