<!-- Левая часть: кнопка завершить -->
<div class="flex-shrink-0">
    <button class="btn btn-soft btn-success flex items-center gap-2 transition-all duration-200 hover:scale-105 hover:shadow-lg active:scale-95"
            hx-post="{% url 'tasks:annotation-save'%}"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
            hx-trigger="click">
        <span class="icon-[tabler--check] size-5"></span>
        Завершить разметку
    </button>
</div>

<!-- Центр: пагинация -->
<nav class="absolute left-1/2 transform -translate-x-1/2 flex items-center gap-x-1">
    <!-- Previous -->
    {% if page.has_previous %}
        <button
                type="button"
                class="btn btn-text btn-square"
                hx-post="{% url 'tasks:annotation' task.pk %}?image={{ page.previous_page_number }}"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                hx-push-url="true"
                hx-swap="none">
            <span class="icon-[tabler--chevron-left] size-5 rtl:rotate-180"></span>
        </button>
    {% else %}
        <button type="button" class="btn btn-text btn-square" disabled>
            <span class="icon-[tabler--chevron-left] size-5 rtl:rotate-180"></span>
        </button>
    {% endif %}

    <!-- Page info -->
    <div class="flex items-center gap-x-1">
        <span class="btn btn-text btn-square pointer-events-none" aria-current="page">{{ page.number }}</span>
        <span class="text-base-content/80 mx-3">из</span>
        <span class="btn btn-text btn-square pointer-events-none">{{ page.paginator.num_pages }}</span>
    </div>

    <!-- Next -->
    {% if page.has_next %}
        <button
                type="button"
                class="btn btn-text btn-square"
                hx-post="{% url 'tasks:annotation' task.pk %}?image={{ page.next_page_number }}"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                hx-push-url="true"
                hx-swap="none">
            <span class="icon-[tabler--chevron-right] size-5 rtl:rotate-180"></span>
        </button>
    {% else %}
        <button type="button" class="btn btn-text btn-square" disabled>
            <span class="icon-[tabler--chevron-right] size-5 rtl:rotate-180"></span>
        </button>
    {% endif %}
</nav>

<!-- Правая часть: кнопка настройки -->
<div class="flex-shrink-0 ml-auto">
    <button type="button" class="btn btn-outline btn-sm">
        <span class="icon-[tabler--settings] size-5"></span>
    </button>
</div>
